services:
  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: vyzor-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - vyzor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vyzor-internal

  # ── Laravel Application ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyzor-app
    env_file: .env
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vyzor-internal
      - proxy-network

  # ── Queue Worker ─────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyzor-queue
    env_file: .env
    command: php artisan queue:work --tries=3 --timeout=300 --sleep=3 --max-jobs=1000 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - vyzor-internal

  # ── Scheduler (Laravel Cron) ─────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyzor-scheduler
    env_file: .env
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - vyzor-internal

volumes:
  vyzor_pgdata:

networks:
  vyzor-internal:
    driver: bridge
  proxy-network:
    external: true
    name: proxy-network
